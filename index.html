<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS GRID SYSTEM</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .container{
            width: 90%;
            margin: 20px auto;
            display: grid;
            margin-top: 30px;
            grid-template-columns: 1fr 2fr  2fr;
            grid-template-rows:  100px 150px  150px 100px;
            gap: 15px;
           }

          .header{
         grid-column: 1/4;
           }
     .slidebar{
    grid-row: 2/4;
     }
     .content1{
    grid-column: 2 / 4;
 }

   .footer{
    grid-column: 1 / 4;
 }
   .box{
    background-color: greenyellow;
    border: 2px solid green;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    font-weight: bold;
   }

    /* Grid 2  */

    .container2{
       width: 90%;
            margin: 20px auto;
            display: grid;
            margin-top: 30px;
            grid-template-columns: 1fr 2fr;
            grid-template-rows:  100px 100px;
            /* gap: 15px; */
    }
    .maincontent{
    grid-row: 2/3;
    background-color: green;
    }
    .slidebar2{
       background-color: rgb(177, 116, 177);
       grid-column: 4/4;
    }
     
    </style>
</head>
<body>
    
    <div class="container">
    <div class=" box header">Header</div>
    <div class=" box slidebar">Slide Bar</div>
    <div class=" box content1">Content 1</div>
    <div class=" box content2">Content 2</div>
    <div class=" box content3">Content 3</div>
    <div class=" box footer">Footer</div>
    </div>


    <div class="container2">
    <div class="maincontent"> Main Content</div>
    <div class="slidebar2">Slide bar</div>
    <div class="twin">Twin</div>
    <div class="twin">Twin</div>
 </div>
</body>
</html>
