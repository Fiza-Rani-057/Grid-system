<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS GRID SYSTEM</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 90%;
      margin: 20px auto;
      display: grid;
      margin-top: 30px;
      grid-template-columns: 1fr 2fr 2fr;
      grid-template-rows: 100px 150px 150px 100px;
      gap: 15px;
    }

    .header {
      grid-column: 1/4;
    }

    .slidebar {
      grid-row: 2/4;
    }

    .content1 {
      grid-column: 2 / 4;
    }

    .footer {
      grid-column: 1 / 4;

    }

    .box {
      background-color: greenyellow;
      border: 2px solid green;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* Grid 2  */

    .container2 {
      width: 90%;
      margin: 50px auto;
      display: grid;
      margin-top: 100px;
      gap: 15px;
      grid-template-columns: 2fr 2fr 2fr;
      grid-template-rows: 100px 100px 100px 100px;
    }

    .maincontent {
      grid-column: 1/3;
      grid-row: 1/3;
      background-color: rgb(238, 238, 158);
      border: 3px solid wheat;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    .slidebar2 {
      background-color: rgb(177, 116, 177);
      border: 3px solid rgb(217, 115, 217);
      grid-column: 3/4;
      grid-row: 1/3;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    .twin {
      background-color: rgb(254, 178, 38);
      border: 3px solid rgb(238, 213, 205);
      grid-column: 1/2;
      grid-row: 3/5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    .TWIN {
      background-color: rgb(9, 249, 249);
      border: 3px solid rgb(116, 211, 242);
      grid-column: 2/4;
      grid-row: 3/5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 100px);
      width: 100%;
      margin: 20px auto;
    }

    .box1 {
      grid-area: 1 / 1 / 2 / 3;
      background-color: aquamarine;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    .box2 {
      grid-area: 1 / 3 / 2 / 4;
      background-color: aqua;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

 </style>
  
 </head>
 <body>

  <div class="container">
    <div class=" box header">Header</div>
    <div class=" box slidebar">Slide Bar</div>
    <div class=" box content1">Content 1</div>
    <div class=" box content2">Content 2</div>
    <div class=" box content3">Content 3</div>
    <div class=" box footer">Footer</div>
  </div>

  <div class="container2">
    <div class="maincontent"> Main Content</div>
    <div class="slidebar2">Slide bar</div>
    <div class="twin">Twin</div>
    <div class="TWIN">Twin</div>
  </div>


  <div class="container3">
    <div class="box1">box 1</div>
    <div class="box2">box 2</div>
  </div>
</body>

</html>
